# Dataset options
fixdim: 2500
label_path: ./data 
# dataDir: /default/HOME/cambridge/data/data_wxf/ #zhijiang img"/TCGA/Res50_feature_2500_fixdim0_norm" "/TCGA/transcriptomeProfiling_geneExpression"
dataDir: /home/cbtil3/WSI_proj/data/ # cbtil3: /home/cbtil3/WSI_proj/data/ # cbtil2: /home/cbtil2/WSI_proj/data/
dataset: TCGA
checkpoints: "./checkpoints"
novalset: False

# Distributed training options
nodes: 1
# gpus: 2
# visiable_device: "0,1"
gpus: 2
visiable_device: "0,1"
nr: 0
dataparallel: 0
workers: 8

# Modality fusion
fusion_type: "pofusion" # fusion_type: "pofusion" for pathomic_original; "mmdynamics" "concat" "baseline" "add"
skip: 0
use_bilinear: 1
input_size_omic: 431 # gene number
input_size_omic_tumor: 59
input_size_omic_immune: 361
# input_size_path: 512
input_path_dim: 1024
path_gate: 1
omic_gate: 1
path_dim: 128
omic_dim: 128
# path_dim: 512
# omic_dim: 512
path_scale: 1
omic_scale: 1
mmhid: 128
# mmhid: 512
cut_fuse_grad: False


# Training options
reload: False
seed: 42
batch_size: 8 #8     #16
image_size: [224, 224]
start_epoch: 0
epochs: 10
lr: 2.0e-4
lr_policy: "cosine"
dropout_rate: 0.1
return_grad: False 
optimizer: "adam"
weight_decay: 0.1 # 0.01 for diag2021; 0.1 for survival
init_type: 'max'
init_gain: 0.02 


# Loss options
gradient_modulate: True # gradient
return_vgrid: True # bb loss

# Model options
mode: 'pathomic_original' # 'path' 'omic' 'pathomic' 'pathomic_original' 'deformpathomic' 'mcat' 'cmta'
attn_dim: 2 # deform

# Task for diag2021, grade, subtype
task_type: "survival" #["diag2021", "survival", "grade", "subtype"]
label_dim: 4 #[4 for "diag2021", 4 for "survival", 3 for "grade", 3 for "subtype"]
survival_interval: "uncensored" #["uncensored", "all"]
act_type: 'Sigmoid' # 'LSM'
survival_metric: 'sksurv' #lifeline or sksurv